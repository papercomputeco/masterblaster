name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  DAGGER_VERSION: "0.19.11"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-linux:
    name: Build (Linux)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Linux binaries via Dagger
        uses: dagger/dagger-for-github@v8.2.0
        env:
          DAGGER_CLOUD_TOKEN: ${{ secrets.DAGGER_CLOUD_TOKEN }}
        with:
          verb: call
          args: build export --path=./build
          version: ${{ env.DAGGER_VERSION }}

      - name: Upload linux amd64 binaries
        uses: actions/upload-artifact@v4
        with:
          name: linux-amd64-binaries
          path: build/linux/amd64/
          retention-days: 1

      - name: Upload linux arm64 binaries
        uses: actions/upload-artifact@v4
        with:
          name: linux-arm64-binaries
          path: build/linux/arm64/
          retention-days: 1

  build-darwin:
    name: Build (macOS arm64)
    runs-on: macos-15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build and codesign darwin/arm64 binary
        run: make apple-build

      - name: Upload darwin arm64 binaries
        uses: actions/upload-artifact@v4
        with:
          name: darwin-arm64-binaries
          path: build/darwin/arm64/
          retention-days: 1

  smoke:
    name: Smoke Test (${{ matrix.os }})
    needs: [build-linux, build-darwin]
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macOS 15 (arm64)
            runner: macos-15
            artifact: darwin-arm64-binaries
          - os: Linux (amd64)
            runner: ubuntu-latest
            artifact: linux-amd64-binaries
          - os: Linux (arm64)
            runner: ubuntu-22.04-arm
            artifact: linux-arm64-binaries

    steps:
      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ./bin

      - name: Run canary
        run: |
          chmod +x ./bin/mb
          ./bin/mb version
